<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Video Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        /* Animated RGB Border Effect */
        .rgb-border {
            position: relative;
            background: #111;
            border-radius: 12px;
            padding: 2px;
            overflow: hidden;
        }
        .rgb-border::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(#ff0000, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            animation: rotate 4s linear infinite;
        }
        .rgb-inner {
            position: relative;
            background: #000;
            border-radius: 10px;
            z-index: 1;
        }
        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        /* Glassmorphism Buttons */
        .vid-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .vid-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
            transform: translateY(-2px);
            border-color: #00ffff;
        }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center">

    <header class="mb-10 text-center">
        <h1 class="text-4xl font-black tracking-tighter uppercase italic text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-600">
            Video Archive
        </h1>
        <p class="text-gray-500 text-sm mt-2">Select a file to begin playback</p>
    </header>

    <div class="w-full max-w-4xl mb-12">
        <div class="rgb-border">
            <div class="rgb-inner">
                <video id="player" playsinline controls data-poster="">
                    <source src="" type="video/mp4" />
                </video>
            </div>
        </div>
    </div>

    <div id="button-container" class="flex flex-wrap justify-center gap-4 max-w-5xl">
        <p id="loading" class="text-gray-600 animate-pulse">Scanning repository...</p>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script>
        // CONFIGURATION
        const REPO_OWNER = 'Rudycon55555';
        const REPO_NAME = 'My-Videos';
        const FOLDER_PATH = 'videos';

        const player = new Plyr('#player', {
            tooltips: { controls: true, seek: true },
            speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
        });

        async function loadVideos() {
            const container = document.getElementById('button-container');
            const videoElement = document.querySelector('#player');

            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FOLDER_PATH}`);
                const data = await response.json();
                
                document.getElementById('loading').remove();

                const videoFiles = data.filter(file => file.name.endsWith('.mp4'));

                videoFiles.forEach(file => {
                    const btn = document.createElement('button');
                    // Remove .mp4 for the label
                    const displayName = file.name.replace('.mp4', '').replaceAll('-', ' ').replaceAll('_', ' ');
                    
                    btn.className = 'vid-btn px-6 py-3 rounded-full text-sm font-medium uppercase tracking-widest';
                    btn.innerText = displayName;
                    
                    btn.onclick = () => {
                        const videoSource = file.download_url;
                        player.source = {
                            type: 'video',
                            sources: [{ src: videoSource, type: 'video/mp4' }]
                        };
                        player.play();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    };

                    container.appendChild(btn);
                });
            } catch (error) {
                console.error("Error fetching files:", error);
                container.innerHTML = `<p class="text-red-500">Error loading videos. Check repo settings.</p>`;
            }
        }

        loadVideos();
    </script>
</body>
</html>
